<style>
    .hero { --hero-min-col: 18rem; --hero-radius: 0.75rem; }
    @media (max-width: 40rem) {
        .hero-image { min-height: 12rem; }
        .hero-text  { padding: 1.5rem; }
    }
</style>

<div class="hero" style="display: flex; flex-wrap: wrap; width: 100%; align-items: stretch;">

    <div class="hero-text" style="flex: 1 1 var(--hero-min-col); display: flex;
            flex-direction: column; justify-content: center; align-items: flex-start;
            text-align: left; padding: 3rem 2.5rem; gap: 1rem;">



        <h2 style="font-size: clamp(1.4rem, 2.5vw, 1.75rem); font-weight: 600;
               line-height: 1.3; margin: 0;">
            West Coast Swing i Luleå
        </h2>

        <p style="font-size: clamp(0.9rem, 1.5vw, 1rem); line-height: 1.7;
              opacity: 0.7; margin: 0;">
            Lär dig dansa WCS, träffa nya människor och ha kul till fantastisk musik. Gå en kurs eller kom på socialdans – alla är välkomna.
        </p>

        <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.5rem;">
            <a class="inline-block !rounded-md bg-primary-600 px-4 py-2 !text-neutral
                !no-underline hover:!bg-primary-500 dark:bg-primary-800 dark:hover:!bg-primary-700"
               href="/luleawesties/kurser" target="_self" role="button">
                Gå en kurs
            </a>
            <a class="inline-block !rounded-md border border-primary-600 px-4 py-2
                !text-primary-600 !no-underline hover:bg-primary-50"
               href="/evenemang" target="_self" role="button">
                Se dansevenemang
            </a>
        </div>
    </div>

    <div class="hero-image" style="flex: 2 1 var(--hero-min-col); min-height: 20rem;
            overflow: hidden; border-radius: 0 var(--hero-radius) var(--hero-radius) 0;">
        <img
                src="{{ .Get "src" }}"
                alt="{{ .Get "alt" | default "Hero image" }}"
                style="width: 100%; height: 100%; object-fit: cover;"
        />
    </div>

</div>
